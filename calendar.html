<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>カレンダー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --border: #e0e0e0;
      --border-dark: #111111;
      --text: #111111;
      --text-dim: #888888;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 56px 24px 72px;
      overflow-x: hidden;
    }

    .wrapper {
      width: 100%;
      max-width: 860px;
      display: flex;
      flex-direction: column;
      gap: 32px;
      animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      border-bottom: 2px solid var(--border-dark);
      padding-bottom: 20px;
      gap: 16px;
    }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    h1 {
      font-weight: 700;
      font-size: 20px;
      letter-spacing: 0.08em;
      line-height: 1.3;
      color: var(--text);
      text-transform: uppercase;
    }

    .subtitle {
      font-size: 16px;
      font-weight: 400;
      color: var(--text-dim);
      letter-spacing: 0.03em;
    }

    .date-badge {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      font-weight: 300;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      text-align: right;
      white-space: nowrap;
      border: 1px solid var(--border);
      padding: 6px 16px;
      border-radius: 2px;
    }

    /* ── Calendar card ── */
    .cal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .cal-card iframe {
      display: block;
      width: 100%;
      height: 600px;
      border: none;
      filter: grayscale(100%);
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { flex-direction: column; align-items: flex-start; }
      .date-badge { text-align: left; }
      .cal-card iframe { height: 480px; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <div class="header-left">
        <h1>Business Hours</h1>
        <p class="subtitle">Mon – Fri: 10:00 AM – 6:00 PM</p>
        <p class="subtitle">Sat, Sun &amp; Holidays: Closed</p>
      </div>
      <div class="date-badge" id="currentDate"></div>
    </header>

    <div class="cal-card">
      <iframe
        src="https://calendar.google.com/calendar/embed?src=toshin.aice%40gmail.com&ctz=Asia%2FTokyo&showTitle=0&showTz=0&showCalendars=0&showPrint=0&showNav=1&showDate=1&showTabs=1"
        scrolling="no"
        title="Google カレンダー"
      ></iframe>
    </div>


  </div>

  <script>
    // live date badge
    const el = document.getElementById('currentDate');
    const now = new Date();
    const opts = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short', timeZone: 'Asia/Tokyo' };
    el.textContent = now.toLocaleDateString('ja-JP', opts);
  </script>
</body>
</html>
