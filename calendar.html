<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>営業カレンダー | glacemyth Ice Cream</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:        #111111;
      --ink-mid:    #555555;
      --ink-light:  #aaaaaa;
      --paper:      #f6f5f2;
      --paper-warm: #eeece8;
      --rule:       #d8d6d2;
      --closed-bg:  #e4e2de;
      --white:      #ffffff;
      --font-serif: 'Cormorant Garamond', 'Hiragino Mincho ProN', serif;
      --font-sans:  'Noto Sans JP', 'Hiragino Sans', sans-serif;
      --tap-min:    44px;
    }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font-sans);
      font-weight: 300;
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom, 32px);
      -webkit-tap-highlight-color: transparent;
    }

    header {
      border-bottom: 1px solid var(--ink);
      padding: 28px 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .shop-name {
      font-family: var(--font-serif);
      font-size: 1.7rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      line-height: 1.1;
    }

    .header-meta {
      font-size: 0.68rem;
      color: var(--ink-light);
      letter-spacing: 0.06em;
    }

    .month-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      margin: 20px 20px 0;
      border: 1px solid var(--rule);
      border-radius: 6px;
      overflow: hidden;
    }

    .tab-btn {
      background: none;
      border: none;
      color: var(--ink-mid);
      font-family: var(--font-sans);
      font-weight: 300;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      min-height: var(--tap-min);
      cursor: pointer;
      transition: background 0.18s, color 0.18s;
      -webkit-appearance: none;
    }

    .tab-btn:first-child {
      border-right: 1px solid var(--rule);
    }

    .tab-btn.active {
      background: var(--ink);
      color: #fff;
    }

    .tab-btn:not(.active):active {
      background: var(--paper-warm);
    }

    .legend {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 14px 20px 0;
      justify-content: flex-end;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      color: var(--ink-mid);
    }

    .legend-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-dot.open   { background: var(--ink); }
    .legend-dot.closed { background: var(--closed-bg); border: 1px solid var(--rule); }

    .month-heading {
      font-family: var(--font-serif);
      font-size: 1.15rem;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-align: center;
      padding: 16px 0 10px;
      color: var(--ink);
    }

    .calendar-wrap {
      padding: 0 12px;
      overflow-x: hidden;
    }

    table.calendar {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    table.calendar thead th {
      font-family: var(--font-sans);
      font-weight: 400;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--ink-mid);
      text-align: center;
      padding: 0 0 8px;
      border-bottom: 1px solid var(--ink);
    }
    table.calendar thead th.sun { color: var(--ink); }

    table.calendar tbody td {
      vertical-align: top;
      border: 1px solid var(--rule);
      height: 72px;
      padding: 5px 3px 4px;
      position: relative;
    }

    table.calendar tbody td.empty      { background: var(--paper); }
    table.calendar tbody td.open-day   { background: var(--white); }
    table.calendar tbody td.closed-day { background: var(--closed-bg); }

    table.calendar tbody td.today .date-num {
      position: relative;
    }
    table.calendar tbody td.today .date-num::after {
      content: '';
      display: block;
      width: 3px; height: 3px;
      background: var(--ink);
      border-radius: 50%;
      margin: 2px auto 0;
    }

    .date-num {
      font-family: var(--font-serif);
      font-size: 1rem;
      font-weight: 300;
      text-align: center;
      line-height: 1;
      margin-bottom: 3px;
    }

    td.sat .date-num { color: var(--ink-mid); }
    td.sun .date-num { color: var(--ink); font-weight: 400; }

    .cell-status {
      text-align: center;
      line-height: 1.2;
      margin-top: 2px;
    }

    .status-open {
      color: var(--ink-mid);
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .status-open .time-start,
    .status-open .time-end {
      display: block;
      line-height: 1.3;
    }
    .status-open .time-sep {
      display: block;
      color: var(--ink-mid);
      font-size: 0.55em;
      line-height: 1;
    }

    .status-closed {
      color: var(--ink-mid);
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .footer-info {
      padding: 16px 20px 0;
      text-align: right;
      font-size: 0.65rem;
      color: var(--ink-light);
      letter-spacing: 0.06em;
    }

    .loading-msg {
      text-align: center;
      padding: 60px 20px;
      font-family: var(--font-serif);
      font-size: 1rem;
      color: var(--ink-mid);
      letter-spacing: 0.1em;
    }

    .error-msg {
      text-align: center;
      padding: 40px 20px;
      font-size: 0.78rem;
      color: var(--ink-light);
      line-height: 1.8;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .calendar-wrap > * { animation: fadeIn 0.28s ease both; }

    @media (min-width: 768px) {
      header { padding: 36px 40px 22px; flex-direction: row; align-items: flex-end; justify-content: space-between; }
      .shop-name { font-size: 2rem; }
      .month-tabs { margin: 24px 40px 0; border-radius: 4px; }
      .legend { padding: 18px 40px 0; }
      .calendar-wrap { padding: 0 40px; }
      .footer-info { padding: 20px 40px 0; }

      table.calendar tbody td {
        height: auto;
        padding: 10px 10px 14px;
      }
      .date-num    { font-size: 1.1rem; margin-bottom: 6px; }
      .status-open { font-size: 0.6rem; }
      .status-closed { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="shop-name">glacemyth Ice Cream</div>
    <div class="header-meta" id="headerMeta">データ更新日: 2026-03-27</div>
  </header>

  <div class="month-tabs">
    <button class="tab-btn active" id="tabThis" onclick="switchTab(0)">This Month</button>
    <button class="tab-btn"        id="tabNext" onclick="switchTab(1)">Next Month</button>
  </div>



  <div class="calendar-wrap" id="calendarWrap">
    <div class="loading-msg">読み込み中…</div>
  </div>

  <div class="footer-info" id="footerInfo"></div>

  <script>
    const DAY_NAMES = ['日','月','火','水','木','金','土'];

    // デモ用サンプルデータ（calendar_data.json が取得できない環境用）
    const SAMPLE_DATA = {
      shop: { updated: '2026-03-27' },
      months: [
        {
          year: 2026, month: 3,
          days: [
            { date: '2026-03-01', closed: false, label: '10:00 - 18:00' },
            { date: '2026-03-02', closed: true,  label: 'closed' },
            { date: '2026-03-03', closed: false, label: '10:00 - 18:00' },
            { date: '2026-03-04', closed: false, label: '10:00 - 18:00' },
            { date: '2026-03-05', closed: false, label: '10:00 - 18:00' },
            { date: '2026-03-06', closed: false, label: '10:00 - 18:00' },
            { date: '2026-03-07', closed: false, label: '10:00 - 19:00' },
            { date: '2026-03-08', closed: false, label: '10:00 - 19:00' },
            { date: '2026-03-09', closed: true,  label: 'closed' },
            { date: '2026-03-10', closed: false, label: '10:00 - 18:00' },
            { date: '2026-03-11', closed: false, label: '10:00 - 18:00' },
            { date: '2026-03-12', closed: false, label: '10:00 - 18:00' },
            { date: '2026-03-13', closed: false, label: '10:00 - 18:00' },
            { date: '2026-03-14', closed: false, label: '10:00 - 19:00' },
            { date: '2026-03-15', closed: false, label: '10:00 - 19:00' },
            { date: '2026-03-16', closed: true,  label: 'closed' },
            { date: '2026-03-17', closed: false, label: '10:00 - 18:00' },
            { date: '2026-03-18', closed: false, label: '10:00 - 18:00' },
            { date: '2026-03-19', closed: false, label: '10:00 - 18:00' },
            { date: '2026-03-20', closed: false, label: '10:00 - 18:00' },
            { date: '2026-03-21', closed: false, label: '10:00 - 19:00' },
            { date: '2026-03-22', closed: false, label: '10:00 - 19:00' },
            { date: '2026-03-23', closed: true,  label: 'closed' },
            { date: '2026-03-24', closed: false, label: '10:00 - 18:00' },
            { date: '2026-03-25', closed: false, label: '10:00 - 18:00' },
            { date: '2026-03-26', closed: false, label: '10:00 - 18:00' },
            { date: '2026-03-27', closed: false, label: '10:00 - 18:00' },
            { date: '2026-03-28', closed: false, label: '10:00 - 19:00' },
            { date: '2026-03-29', closed: false, label: '10:00 - 19:00' },
            { date: '2026-03-30', closed: true,  label: 'closed' },
            { date: '2026-03-31', closed: false, label: '10:00 - 18:00' },
          ]
        },
        {
          year: 2026, month: 4,
          days: [
            { date: '2026-04-01', closed: false, label: '10:00 - 18:00' },
            { date: '2026-04-02', closed: false, label: '10:00 - 18:00' },
            { date: '2026-04-03', closed: false, label: '10:00 - 18:00' },
            { date: '2026-04-04', closed: false, label: '10:00 - 19:00' },
            { date: '2026-04-05', closed: false, label: '10:00 - 19:00' },
            { date: '2026-04-06', closed: true,  label: 'closed' },
            { date: '2026-04-07', closed: false, label: '10:00 - 18:00' },
            { date: '2026-04-08', closed: false, label: '10:00 - 18:00' },
            { date: '2026-04-09', closed: false, label: '10:00 - 18:00' },
            { date: '2026-04-10', closed: false, label: '10:00 - 18:00' },
            { date: '2026-04-11', closed: false, label: '10:00 - 19:00' },
            { date: '2026-04-12', closed: false, label: '10:00 - 19:00' },
            { date: '2026-04-13', closed: true,  label: 'closed' },
            { date: '2026-04-14', closed: false, label: '10:00 - 18:00' },
            { date: '2026-04-15', closed: false, label: '10:00 - 18:00' },
            { date: '2026-04-16', closed: false, label: '10:00 - 18:00' },
            { date: '2026-04-17', closed: false, label: '10:00 - 18:00' },
            { date: '2026-04-18', closed: false, label: '10:00 - 19:00' },
            { date: '2026-04-19', closed: false, label: '10:00 - 19:00' },
            { date: '2026-04-20', closed: true,  label: 'closed' },
            { date: '2026-04-21', closed: false, label: '10:00 - 18:00' },
            { date: '2026-04-22', closed: false, label: '10:00 - 18:00' },
            { date: '2026-04-23', closed: false, label: '10:00 - 18:00' },
            { date: '2026-04-24', closed: false, label: '10:00 - 18:00' },
            { date: '2026-04-25', closed: false, label: '10:00 - 19:00' },
            { date: '2026-04-26', closed: false, label: '10:00 - 19:00' },
            { date: '2026-04-27', closed: true,  label: 'closed' },
            { date: '2026-04-28', closed: false, label: '10:00 - 18:00' },
            { date: '2026-04-29', closed: false, label: '10:00 - 19:00' },
            { date: '2026-04-30', closed: false, label: '10:00 - 18:00' },
          ]
        }
      ]
    };

    let allData = null;
    let offset  = 0;

    function getYM(off) {
      const now = new Date();
      let y = now.getFullYear();
      let m = now.getMonth() + 1 + off;
      if (m > 12) { m -= 12; y += 1; }
      return { year: y, month: m };
    }

    function init() {
      allData = SAMPLE_DATA;
      document.getElementById('headerMeta').textContent =
        'データ更新日: ' + allData.shop.updated;
      render();
    }

    function switchTab(off) {
      offset = off;
      document.getElementById('tabThis').classList.toggle('active', off === 0);
      document.getElementById('tabNext').classList.toggle('active', off === 1);
      render();
    }

    function render() {
      const ym        = getYM(offset);
      const monthData = (allData?.months || []).find(
        m => m.year === ym.year && m.month === ym.month
      );
      const dayMap = {};
      if (monthData) for (const d of monthData.days) dayMap[d.date] = d;

      const firstDay = new Date(ym.year, ym.month - 1, 1).getDay();
      const lastDate = new Date(ym.year, ym.month, 0).getDate();
      const today    = new Date();

      const wrap = document.getElementById('calendarWrap');
      wrap.innerHTML = '';

      const heading = document.createElement('div');
      heading.className   = 'month-heading';
      heading.textContent = ym.year + '年 ' + ym.month + '月';
      wrap.appendChild(heading);

      const table   = document.createElement('table');
      table.className = 'calendar';

      const thead   = document.createElement('thead');
      const headRow = document.createElement('tr');
      DAY_NAMES.forEach((name, i) => {
        const th = document.createElement('th');
        th.textContent = name;
        if (i === 0) th.className = 'sun';
        if (i === 6) th.className = 'sat';
        headRow.appendChild(th);
      });
      thead.appendChild(headRow);
      table.appendChild(thead);

      const tbody = document.createElement('tbody');
      let date = 1;

      for (let week = 0; week < 6; week++) {
        if (date > lastDate) break;
        const tr = document.createElement('tr');

        for (let dow = 0; dow < 7; dow++) {
          const td = document.createElement('td');

          if ((week === 0 && dow < firstDay) || date > lastDate) {
            td.className = 'empty';
          } else {
            const mm  = String(ym.month).padStart(2, '0');
            const dd  = String(date).padStart(2, '0');
            const key = ym.year + '-' + mm + '-' + dd;
            const info     = dayMap[key];
            const isClosed = info?.closed ?? false;

            const cls = [isClosed ? 'closed-day' : 'open-day'];
            if (dow === 0) cls.push('sun');
            if (dow === 6) cls.push('sat');
            if (
              date     === today.getDate() &&
              ym.month === today.getMonth() + 1 &&
              ym.year  === today.getFullYear()
            ) cls.push('today');
            td.className = cls.join(' ');

            const num = document.createElement('div');
            num.className   = 'date-num';
            num.textContent = date;
            td.appendChild(num);

            const label = info?.label ?? '';
            if (label !== '') {
              const st = document.createElement('div');
              if (isClosed) {
                st.className = 'cell-status status-closed';
                st.textContent = label;
              } else {
                st.className = 'cell-status status-open';
                const parts = label.split(' - ');
                if (parts.length === 2) {
                  const s = document.createElement('span');
                  s.className = 'time-start';
                  s.textContent = parts[0];
                  const sep = document.createElement('span');
                  sep.className = 'time-sep';
                  sep.textContent = '❘';
                  const e = document.createElement('span');
                  e.className = 'time-end';
                  e.textContent = parts[1];
                  st.appendChild(s);
                  st.appendChild(sep);
                  st.appendChild(e);
                } else {
                  st.textContent = label;
                }
              }
              td.appendChild(st);
            }
            date++;
          }
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      }
      table.appendChild(tbody);
      wrap.appendChild(table);

      document.getElementById('footerInfo').textContent =
        allData ? 'Last updated: ' + allData.shop.updated : '';
    }

    init();
  </script>
</body>
</html>
