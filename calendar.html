<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>営業カレンダー | glacemyth Ice Cream</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:        #111111;
      --ink-mid:    #555555;
      --ink-light:  #aaaaaa;
      --paper:      #f6f5f2;
      --paper-warm: #eeece8;
      --rule:       #d8d6d2;
      --closed-bg:  #e4e2de;
      --white:      #ffffff;
      --font-serif: 'Cormorant Garamond', 'Hiragino Mincho ProN', serif;
      --font-sans:  'Noto Sans JP', 'Hiragino Sans', sans-serif;
      --tap-min:    44px;
    }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font-sans);
      font-weight: 300;
      min-height: 100vh;
      padding-bottom: env(safe-area-inset-bottom, 32px);
      -webkit-tap-highlight-color: transparent;
    }

    /* ── ヘッダー ── */
    header {
      border-bottom: 1px solid var(--ink);
      padding: 28px 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .shop-name {
      font-family: var(--font-serif);
      font-size: 1.7rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      line-height: 1.1;
    }

    .header-meta {
      font-size: 0.68rem;
      color: var(--ink-light);
      letter-spacing: 0.06em;
    }

    /* ── 月タブ（動的生成） ── */
    .month-tabs {
      display: flex;
      margin: 20px 20px 0;
      border: 1px solid var(--rule);
      border-radius: 6px;
      overflow: hidden;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .tab-btn {
      flex: 1 0 auto;
      min-width: 0;
      background: none;
      border: none;
      border-right: 1px solid var(--rule);
      color: var(--ink-mid);
      font-family: var(--font-sans);
      font-weight: 300;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      min-height: var(--tap-min);
      padding: 0 14px;
      cursor: pointer;
      transition: background 0.18s, color 0.18s;
      -webkit-appearance: none;
      white-space: nowrap;
    }

    .tab-btn:last-child {
      border-right: none;
    }

    .tab-btn.active {
      background: var(--ink);
      color: #fff;
    }

    .tab-btn:not(.active):active {
      background: var(--paper-warm);
    }

    /* ── 凡例 ── */
    .legend {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 14px 20px 0;
      justify-content: flex-end;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      color: var(--ink-mid);
    }

    .legend-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-dot.open   { background: var(--ink); }
    .legend-dot.closed { background: var(--closed-bg); border: 1px solid var(--rule); }

    /* ── 月見出し ── */
    .month-heading {
      font-family: var(--font-serif);
      font-size: 1.15rem;
      font-weight: 300;
      letter-spacing: 0.14em;
      text-align: center;
      padding: 16px 0 10px;
      color: var(--ink);
    }

    /* ── カレンダーラッパー ── */
    .calendar-wrap {
      padding: 0 12px;
      overflow-x: hidden;
    }

    /* ── テーブル ── */
    table.calendar {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    table.calendar thead th {
      font-family: var(--font-sans);
      font-weight: 400;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--ink-mid);
      text-align: center;
      padding: 0 0 8px;
      border-bottom: 1px solid var(--ink);
    }
    table.calendar thead th.sun { color: var(--ink); }

    table.calendar tbody td {
      vertical-align: top;
      border: 1px solid var(--rule);
      height: calc((100vw - 24px) / 7 * 1.45);
      padding: 5px 3px 4px;
      position: relative;
    }

    table.calendar tbody td.empty      { background: var(--paper); }
    table.calendar tbody td.open-day   { background: var(--white); }
    table.calendar tbody td.closed-day { background: var(--closed-bg); }

    /* 今日マーカー */
    table.calendar tbody td.today .date-num {
      position: relative;
    }
    table.calendar tbody td.today .date-num::after {
      content: '';
      display: block;
      width: 3px; height: 3px;
      background: var(--ink);
      border-radius: 50%;
      margin: 2px auto 0;
    }

    .date-num {
      font-family: var(--font-serif);
      font-size: clamp(0.85rem, 3.5vw, 1.05rem);
      font-weight: 300;
      text-align: center;
      line-height: 1;
      margin-bottom: 3px;
    }

    td.sat .date-num { color: var(--ink-mid); }
    td.sun .date-num { color: var(--ink); font-weight: 400; }

    .cell-status {
      text-align: center;
      line-height: 1.2;
      margin-top: 2px;
    }

    .status-open {
      color: var(--ink-mid);
      font-family: var(--font-serif);
      font-style: italic;
      font-size: clamp(0.72rem, 2.8vw, 0.88rem);
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .status-open .time-start,
    .status-open .time-end {
      display: block;
      line-height: 1.3;
    }
    .status-open .time-sep {
      display: block;
      color: var(--ink-mid);
      font-size: 0.55em;
      line-height: 1;
    }

    .status-closed {
      color: var(--ink-mid);
      font-family: var(--font-serif);
      font-style: italic;
      font-size: clamp(0.72rem, 2.8vw, 0.88rem);
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    /* ── フッター ── */
    .footer-info {
      padding: 16px 20px 0;
      text-align: right;
      font-size: 0.65rem;
      color: var(--ink-light);
      letter-spacing: 0.06em;
    }

    .loading-msg {
      text-align: center;
      padding: 60px 20px;
      font-family: var(--font-serif);
      font-size: 1rem;
      color: var(--ink-mid);
      letter-spacing: 0.1em;
    }

    .error-msg {
      text-align: center;
      padding: 40px 20px;
      font-size: 0.78rem;
      color: var(--ink-light);
      line-height: 1.8;
    }

    /* ── アニメーション ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .calendar-wrap > * { animation: fadeIn 0.28s ease both; }

    /* ── デスクトップ補正（768px以上） ── */
    @media (min-width: 768px) {
      body {
        max-width: 720px;
        margin-left: auto;
        margin-right: auto;
      }
      header { padding: 36px 40px 22px; flex-direction: row; align-items: flex-end; justify-content: space-between; }
      .shop-name { font-size: 2rem; }
      .month-tabs { margin: 24px 40px 0; border-radius: 4px; }
      .legend { padding: 18px 40px 0; }
      .calendar-wrap { padding: 0 40px; }
      .footer-info { padding: 20px 40px 0; }

      table.calendar tbody td {
        height: auto;
        padding: 10px 10px 14px;
      }
      .date-num    { font-size: 1.1rem; margin-bottom: 6px; }
      .status-open { font-size: 0.9rem; }
      .status-closed { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

  <header>
    <div class="shop-name">glacemyth Ice Cream</div>
    <div class="header-meta" id="headerMeta">読み込み中…</div>
  </header>

  <div class="month-tabs" id="monthTabs">
    <!-- 動的生成 -->
  </div>

  <div class="legend">
    &nbsp;
  </div>

  <div class="calendar-wrap" id="calendarWrap">
    <div class="loading-msg">読み込み中…</div>
  </div>

  <div class="footer-info" id="footerInfo"></div>

  <script>
    const DATA_URL  = './calendar_data.json';
    const DAY_NAMES = ['日','月','火','水','木','金','土'];

    let allData    = null;
    let monthList  = [];   // [{year, month}, ...]
    let currentIdx = 0;

    async function loadData() {
      try {
        const res = await fetch(DATA_URL + '?_=' + Date.now());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        allData = await res.json();
        document.getElementById('headerMeta').textContent =
          'データ更新日: ' + allData.shop.updated;

        // 月リストを構築
        monthList = (allData.months || []).map(m => ({ year: m.year, month: m.month }));

        if (monthList.length === 0) {
          document.getElementById('calendarWrap').innerHTML =
            '<div class="error-msg">カレンダーデータがありません。</div>';
          return;
        }

        // 当月があればそれを初期表示、なければ最初の月
        const now = new Date();
        const thisY = now.getFullYear();
        const thisM = now.getMonth() + 1;
        const found = monthList.findIndex(m => m.year === thisY && m.month === thisM);
        currentIdx = found >= 0 ? found : 0;

        buildTabs();
        render();
      } catch (e) {
        document.getElementById('calendarWrap').innerHTML =
          '<div class="error-msg">データの読み込みに失敗しました。<br>しばらくしてから再度お試しください。</div>';
      }
    }

    function buildTabs() {
      const container = document.getElementById('monthTabs');
      container.innerHTML = '';

      // 当月と翌月のみ表示（データがあれば）
      const now   = new Date();
      const thisY = now.getFullYear();
      const thisM = now.getMonth() + 1;
      let nextY = thisY;
      let nextM = thisM + 1;
      if (nextM > 12) { nextM = 1; nextY += 1; }

      // 表示する月インデックスを収集（当月・翌月 + データがない場合は最初の2つ）
      const showIndices = [];
      const idxThis = monthList.findIndex(m => m.year === thisY && m.month === thisM);
      const idxNext = monthList.findIndex(m => m.year === nextY && m.month === nextM);

      if (idxThis >= 0) showIndices.push(idxThis);
      if (idxNext >= 0) showIndices.push(idxNext);

      // 当月も翌月もデータにない場合、最初の2つを表示
      if (showIndices.length === 0) {
        showIndices.push(0);
        if (monthList.length > 1) showIndices.push(1);
      } else if (showIndices.length === 1) {
        // 片方しかない場合、もう1つ隣を追加
        const idx = showIndices[0];
        if (idx + 1 < monthList.length && !showIndices.includes(idx + 1)) {
          showIndices.push(idx + 1);
        } else if (idx - 1 >= 0 && !showIndices.includes(idx - 1)) {
          showIndices.unshift(idx - 1);
        }
      }

      showIndices.forEach(idx => {
        const m   = monthList[idx];
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (idx === currentIdx ? ' active' : '');
        btn.textContent = m.year + '年' + m.month + '月';
        btn.addEventListener('click', () => switchTab(idx));
        container.appendChild(btn);
      });
    }

    function switchTab(idx) {
      currentIdx = idx;
      // タブのアクティブ状態を更新
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(btn => {
        const m = monthList[idx];
        if (btn.textContent === m.year + '年' + m.month + '月') {
          btn.classList.add('active');
        }
      });
      render();
    }

    function render() {
      const m = monthList[currentIdx];
      const monthData = (allData?.months || []).find(
        md => md.year === m.year && md.month === m.month
      );
      const dayMap = {};
      if (monthData) for (const d of monthData.days) dayMap[d.date] = d;

      const firstDay = new Date(m.year, m.month - 1, 1).getDay();
      const lastDate = new Date(m.year, m.month, 0).getDate();
      const today    = new Date();

      const wrap = document.getElementById('calendarWrap');
      wrap.innerHTML = '';

      // 月見出し
      const heading = document.createElement('div');
      heading.className   = 'month-heading';
      heading.textContent = m.year + '年 ' + m.month + '月';
      wrap.appendChild(heading);

      // テーブル
      const table   = document.createElement('table');
      table.className = 'calendar';

      // thead
      const thead   = document.createElement('thead');
      const headRow = document.createElement('tr');
      DAY_NAMES.forEach((name, i) => {
        const th = document.createElement('th');
        th.textContent = name;
        if (i === 0) th.className = 'sun';
        if (i === 6) th.className = 'sat';
        headRow.appendChild(th);
      });
      thead.appendChild(headRow);
      table.appendChild(thead);

      // tbody
      const tbody = document.createElement('tbody');
      let date = 1;

      for (let week = 0; week < 6; week++) {
        if (date > lastDate) break;
        const tr = document.createElement('tr');

        for (let dow = 0; dow < 7; dow++) {
          const td = document.createElement('td');

          if ((week === 0 && dow < firstDay) || date > lastDate) {
            td.className = 'empty';
          } else {
            const mm  = String(m.month).padStart(2, '0');
            const dd  = String(date).padStart(2, '0');
            const key = m.year + '-' + mm + '-' + dd;
            const info     = dayMap[key];
            const isClosed = info?.closed ?? false;

            const cls = [isClosed ? 'closed-day' : 'open-day'];
            if (dow === 0) cls.push('sun');
            if (dow === 6) cls.push('sat');
            if (
              date     === today.getDate() &&
              m.month  === today.getMonth() + 1 &&
              m.year   === today.getFullYear()
            ) cls.push('today');
            td.className = cls.join(' ');

            // 日付数字
            const num = document.createElement('div');
            num.className   = 'date-num';
            num.textContent = date;
            td.appendChild(num);

            // E列の値をそのままセルに表示
            const label = info?.label ?? '';
            if (label !== '') {
              const st = document.createElement('div');
              if (isClosed) {
                st.className = 'cell-status status-closed';
                st.textContent = label;
              } else {
                st.className = 'cell-status status-open';
                const parts = label.split(' - ');
                if (parts.length === 2) {
                  const s = document.createElement('span');
                  s.className = 'time-start';
                  s.textContent = parts[0];
                  const sep = document.createElement('span');
                  sep.className = 'time-sep';
                  sep.textContent = '❘';
                  const e = document.createElement('span');
                  e.className = 'time-end';
                  e.textContent = parts[1];
                  st.appendChild(s);
                  st.appendChild(sep);
                  st.appendChild(e);
                } else {
                  st.textContent = label;
                }
              }
              td.appendChild(st);
            }
            date++;
          }
          tr.appendChild(td);
        }
        tbody.appendChild(tr);
      }
      table.appendChild(tbody);
      wrap.appendChild(table);

      document.getElementById('footerInfo').textContent =
        allData ? 'Last updated: ' + allData.shop.updated : '';
    }

    loadData();
  </script>
</body>
</html>
