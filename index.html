<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>グラスミス アイスクリーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Noto+Sans+JP:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink:        #111111;
    --ink-mid:    #555555;
    --ink-light:  #aaaaaa;
    --paper:      #f6f5f2;
    --paper-warm: #eeece8;
    --rule:       #d8d6d2;
    --closed-bg:  #e4e2de;
    --white:      #ffffff;
    --accent:     #555555;
    --font-serif: 'Cormorant Garamond', 'Hiragino Mincho ProN', serif;
    --font-sans:  'Noto Sans JP', 'Hiragino Sans', sans-serif;
    --tap-min:    44px;
  }

  html {
    font-size: 16px;
    scroll-behavior: smooth;
    -webkit-text-size-adjust: 100%;
  }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--font-sans);
    font-weight: 300;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -webkit-tap-highlight-color: transparent;
    overflow-x: hidden;
    padding-bottom: env(safe-area-inset-bottom, 32px);
  }

  /* ── Hero ── */
  .hero {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    padding: 44px 24px 28px;
    border-bottom: 1px solid var(--ink);
  }
  .hero-tag {
    font-family: var(--font-serif);
    font-size: 0.72rem; font-weight: 300; font-style: italic;
    letter-spacing: 0.18em; color: var(--ink-mid);
    margin-bottom: 8px;
    opacity: 0; animation: fadeIn .7s ease .2s forwards;
  }
  .hero-title {
    font-family: var(--font-serif);
    font-size: clamp(2rem, 7vw, 2.8rem); font-weight: 300;
    letter-spacing: 0.08em; color: var(--ink);
    line-height: 1.15; margin-bottom: 2px;
    opacity: 0; animation: fadeIn .7s ease .4s forwards;
  }
  .hero-sub {
    font-family: var(--font-serif);
    font-size: clamp(1.1rem, 3vw, 1.4rem); font-weight: 300; font-style: italic;
    letter-spacing: 0.15em; color: var(--ink-mid);
    opacity: 0; animation: fadeIn .7s ease .6s forwards;
    margin-top: 4px;
  }

  /* ── Filter bar & Sticky Header ── */
  .sticky-header {
    position: sticky; top: 0; z-index: 50;
    background: var(--paper);
    border-bottom: 1px solid var(--rule);
  }
  .sec-filter {
    padding: 14px 12px 12px;
    text-align: center;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .filters {
    display: flex; gap: 6px; justify-content: center;
    flex-wrap: nowrap; min-width: min-content;
  }
  .fb {
    padding: 6px 14px; border-radius: 4px;
    font-size: 0.7rem; font-weight: 300; font-family: var(--font-sans);
    letter-spacing: 0.08em;
    border: 1px solid var(--rule); background: none; color: var(--ink-mid);
    cursor: pointer; transition: all .18s; white-space: nowrap; flex-shrink: 0;
    min-height: var(--tap-min);
    display: inline-flex; align-items: center;
    -webkit-appearance: none;
  }
  .fb:not(.on):active { background: var(--paper-warm); }
  .fb.on { background: var(--ink); color: #fff; border-color: var(--ink); }

  /* ── Notice Message ── */
  .notice-msg {
    text-align: center;
    font-size: 0.75rem;
    font-weight: 300;
    color: var(--ink-mid);
    padding: 0 20px 14px;
    letter-spacing: 0.08em;
  }

  /* ── Items area ── */
  .sec-items { max-width: 640px; margin: 0 auto; padding: 32px 16px 80px; }

  .cat-block { margin-bottom: 48px; }
  .cat-title {
    font-family: var(--font-serif);
    font-size: 1.3rem; font-weight: 300;
    letter-spacing: 0.14em; color: var(--ink);
    text-align: center; margin-bottom: 24px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--rule);
  }

  /* ── Card ── */
  .card {
    background: var(--white);
    border: 1px solid var(--rule);
    padding: 12px 14px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer; user-select: none; -webkit-user-select: none;
    transition: background .18s;
  }
  .card:active { background: var(--paper-warm); }
  .card.nc { cursor: default; }
  .card.nc:active { background: var(--white); }

  .c-dot {
    width: 7px; height: 7px; border-radius: 50%;
    flex-shrink: 0; align-self: flex-start; margin-top: 7px;
  }
  .c-body { flex: 1; min-width: 0; }
  .c-top {
    display: flex; align-items: center;
    justify-content: space-between; gap: 8px; margin-bottom: 5px;
  }
  .c-name {
    display: flex; align-items: center; gap: 6px; min-width: 0; flex: 1;
  }
  .c-name .txt {
    font-family: var(--font-sans);
    font-size: clamp(0.75rem, 3.8vw, 0.92rem);
    font-weight: 400; color: var(--ink);
    letter-spacing: 0.02em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .c-info { width: 13px; height: 13px; flex-shrink: 0; color: var(--ink-mid); opacity: .4; }

  .c-price {
    font-family: var(--font-serif); font-size: clamp(1.05rem, 4.5vw, 1.25rem); font-weight: 400;
    color: var(--ink); white-space: nowrap; flex-shrink: 0; text-align: right;
    letter-spacing: 0.02em;
  }
  .c-price .tx {
    font-size: 0.72rem; font-weight: 300; font-family: var(--font-sans);
    margin-left: 3px; color: var(--ink-light); letter-spacing: 0.06em;
  }
  .c-tbd { font-size: clamp(0.7rem, 3vw, 0.78rem); font-weight: 300; color: var(--ink-light); flex-shrink: 0; }

  /* ── Stock display ── */
  .stock-line { display: flex; align-items: center; gap: 8px; margin-top: 3px; }
  .stock-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 8px;
    font-size: 0.88rem; font-weight: 400; letter-spacing: 0.06em;
  }
  .stock-badge.ok  { color: var(--ink-mid); }
  .stock-badge.low { color: var(--ink-mid); }
  .stock-badge.out { color: var(--ink-light); }
  .stock-badge .mark { font-size: 0.82rem; }
  .stock-num {
    font-family: var(--font-serif);
    color: var(--ink-mid); font-style: italic;
  }
  .stock-num .label { font-size: 0.95rem; font-weight: 300; }
  .stock-num .val { font-size: 1.4rem; font-weight: 400; }

  /* ── Modal ── */
  .ov {
    display: none; position: fixed; inset: 0; z-index: 1000;
    align-items: center; justify-content: center; padding: 20px;
  }
  .ov.show { display: flex; animation: fadeIn .2s ease both; }
  .ov-bg {
    position: absolute; inset: 0;
    background: rgba(17,17,17,0.35);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  }
  .md {
    position: relative; z-index: 1; background: var(--white);
    border: 1px solid var(--rule);
    overflow: hidden; max-width: 400px; width: 100%;
    box-shadow: 0 16px 48px rgba(0,0,0,0.08);
    animation: modalUp .3s cubic-bezier(.2,.8,.2,1) both;
  }
  .md-img-wrap {
    width: 100%; aspect-ratio: 1/1;
    background: var(--paper-warm);
    display: none; align-items: center; justify-content: center; overflow: hidden;
  }
  .md-img-wrap.has { display: flex; }
  .md-img { width: 100%; height: 100%; object-fit: cover; }
  .md-body { padding: 24px; }
  .md-name {
    font-family: var(--font-sans);
    font-size: 1.1rem; font-weight: 400; color: var(--ink);
    margin-bottom: 4px; letter-spacing: 0.04em;
  }
  .md-price {
    font-family: var(--font-serif); font-size: 1.25rem; font-weight: 400;
    color: var(--ink); margin-bottom: 20px;
  }
  .md-price .tx {
    font-size: 0.72rem; color: var(--ink-light);
    font-family: var(--font-sans); letter-spacing: 0.06em;
  }
  .md-div { height: 1px; background: var(--rule); margin-bottom: 16px; }
  .md-comment {
    font-family: var(--font-sans);
    font-size: 0.82rem; font-weight: 300; color: var(--ink-mid);
    line-height: 1.9; white-space: pre-wrap; letter-spacing: 0.02em;
  }
  .md-close {
    margin-top: 24px; width: 100%; padding: 14px;
    background: none; border: 1px solid var(--rule);
    color: var(--ink-mid); font-size: 0.78rem; font-weight: 300;
    font-family: var(--font-sans); letter-spacing: 0.12em;
    cursor: pointer; transition: all .18s;
    min-height: var(--tap-min);
    -webkit-appearance: none;
  }
  .md-close:active { background: var(--paper-warm); color: var(--ink); }

  /* ── Footer ── */
  .footer {
    text-align: center; padding: 28px 20px 24px;
    font-size: 0.62rem; font-weight: 300;
    color: var(--ink-light); letter-spacing: 0.08em;
    border-top: 1px solid var(--ink);
    max-width: 640px; margin: 0 auto;
  }

  .empty {
    text-align: center; padding: 80px 0;
    color: var(--ink-light); font-size: 0.82rem; font-weight: 300;
    letter-spacing: 0.08em;
  }

  /* ── Animations ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes modalUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .reveal { opacity: 0; transform: translateY(8px); transition: opacity .5s ease, transform .5s ease; }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  /* ── Desktop ── */
  @media (min-width: 768px) {
    .hero { padding: 52px 40px 32px; }
    .sec-filter { padding: 14px 40px 12px; }
    .notice-msg { padding: 0 40px 16px; font-size: 0.8rem; }
    .sec-items { padding: 48px 40px 80px; }
    .card { padding: 16px 18px; gap: 14px; }
    .card:hover { background: var(--paper-warm); }
    .card.nc:hover { background: var(--white); }
    .fb:hover { border-color: var(--ink-mid); color: var(--ink); }
    .md-close:hover { background: var(--paper-warm); color: var(--ink); }
  }
</style>
</head>
<body>

<section class="hero">
  <h1 class="hero-title">glacemyth</h1>
  <p class="hero-sub">Ice Cream</p>
</section>

<div class="sticky-header">
  <nav class="sec-filter">
    <div class="filters" id="filterArea"></div>
  </nav>
  <div class="notice-msg">在庫切れの商品はお問合せください。</div>
</div>

<div class="sec-items" id="itemsArea">
  <div class="empty">読み込み中...</div>
</div>
<div class="footer" id="footer" style="display:none">© glacemyth Ice Cream</div>

<div class="ov" id="overlay" onclick="closeM(event)">
  <div class="ov-bg"></div>
  <div class="md" id="modal">
    <div class="md-img-wrap" id="mImgW"><img class="md-img" id="mImg" src="" alt=""></div>
    <div class="md-body">
      <div class="md-name" id="mName"></div>
      <div class="md-price" id="mPrice"></div>
      <div class="md-div" id="mDiv"></div>
      <div class="md-comment" id="mCmt"></div>
      <button class="md-close" onclick="hideM()">閉じる</button>
    </div>
  </div>
</div>

<script>
// 色の設定
const C={
  'バニラ':'#f3e5ab','抹茶':'#6b7a5c','チョコチップ':'#6e6058',
  'ラムレーズンアイスチーズ':'#e2d2b0','ラムレーズン':'#6e5a70',
  '苺':'#e57373','ピスタチオ':'#8bc34a','塩バニラ':'#cfd8dc',
  'チョコミント':'#4db6ac','キャラメル':'#ffa726','クッキー':'#7a7060',
  'さつまいも':'#ba68c8','マロン':'#a1887f','パッション':'#ffd54f',
  'ラズベリー':'#f06292','チーズ':'#fff176',
};
function gc(n){const k=Object.keys(C).sort((a,b)=>b.length-a.length);for(const c of k)if(n.includes(c))return C[c];return'#dcdcdc';}
const INFO='<svg class="c-info" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>';

let allData=[],filter='all';

async function load(){
  try{
    const r=await fetch('inventory.json?t='+Date.now());
    const j=await r.json();
    allData=j.items||[];
    document.getElementById('footer').style.display='block';
    render();
  }catch(e){
    document.getElementById('itemsArea').innerHTML='<div class="empty">inventory.json が読み込めません</div>';
  }
}

function stockHtml(stock){
  if(stock===0){
    return '<div class="stock-line"><span class="stock-badge out"><span class="mark">✕</span> 品切れ</span></div>';
  }
  if(stock<=2){
    return '<div class="stock-line"><span class="stock-badge low"><span class="mark">△</span> 残りわずか</span><span class="stock-num"><span class="label">在庫</span> <span class="val">'+stock+'</span></span></div>';
  }
  return '<div class="stock-line"><span class="stock-badge ok"><span class="mark">◎</span> 在庫あり</span><span class="stock-num"><span class="label">在庫</span> <span class="val">'+stock+'</span></span></div>';
}

function isSorbet(name){return name.includes('シャーベット')||name.includes('ソルベ');}

function render(){
  const s={
    total:allData.length,
    ice:allData.filter(d=>!isSorbet(d.flavor)).length,
    sorbet:allData.filter(d=>isSorbet(d.flavor)).length,
    out:allData.filter(d=>d.stock===0).length
  };
  document.getElementById('filterArea').innerHTML=[
    {k:'all',l:'All '+s.total},{k:'icecream',l:'Ice Cream '+s.ice},
    {k:'sorbet',l:'Sorbet '+s.sorbet},{k:'out',l:'Sold Out '+s.out},
  ].map(f=>`<button class="fb ${filter===f.k?'on':''}" onclick="setF('${f.k}')">${f.l}</button>`).join('');

  let items=allData;
  if(filter==='icecream')items=items.filter(d=>!isSorbet(d.flavor));
  if(filter==='sorbet')items=items.filter(d=>isSorbet(d.flavor));
  if(filter==='out')items=items.filter(d=>d.stock===0);
  
  const g={};
  items.forEach(d=>{
    const c=(d.container||'その他').replace(/【/g, '').replace(/】/g, '');
    if(!g[c])g[c]=[];
    g[c].push(d);
  });

  if(!Object.keys(g).length){
    document.getElementById('itemsArea').innerHTML='<div class="empty">該当する商品がありません</div>';
    return;
  }

  let h='';
  for(const[cat,list]of Object.entries(g)){
    h+=`<div class="cat-block reveal"><div class="cat-title">${cat}</div>`;
    for(const it of list){
      const clr=gc(it.flavor);
      const hc=it.comment&&it.comment.trim(),hi=it.image&&it.image.trim(),hd=hc||hi;
      const price=it.price>0?`<div class="c-price">¥${it.price.toLocaleString()}<span class="tx">税込</span></div>`:'<div class="c-tbd">価格未定</div>';
      const click=hd?`onclick="showM('${esc(it.flavor)}',${it.price||0},'${clr}','${esc(it.comment||'')}','${esc(it.image||'')}')"`:''
      h+=`<div class="card ${hd?'':'nc'}" ${click}>
        <div class="c-dot" style="background:${clr}"></div>
        <div class="c-body">
          <div class="c-top"><div class="c-name"><span class="txt">${it.flavor}</span>${hd?INFO:''}</div>${price}</div>
          ${stockHtml(it.stock)}
        </div>
      </div>`;
    }
    h+='</div>';
  }
  document.getElementById('itemsArea').innerHTML=h;
  observe();
}

function observe(){
  const els=document.querySelectorAll('.reveal');
  const io=new IntersectionObserver((entries)=>{
    entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');io.unobserve(e.target);}});
  },{threshold:0.15});
  els.forEach(el=>io.observe(el));
}

function showM(name,price,color,comment,image){
  const w=document.getElementById('mImgW'),img=document.getElementById('mImg');
  if(image){img.src=image;img.alt=name;w.classList.add('has');}else{img.src='';w.classList.remove('has');}
  document.getElementById('mName').textContent=name;
  const mp=document.getElementById('mPrice');
  if(price>0){mp.innerHTML='¥'+price.toLocaleString()+'<span class="tx"> 税込</span>';mp.style.display='block';}else{mp.style.display='none';}
  const cm=document.getElementById('mCmt'),dv=document.getElementById('mDiv');
  if(comment){cm.innerHTML=comment.replace(/\\n/g,'<br>').replace(/\n/g,'<br>');cm.style.display='block';dv.style.display='block';}else{cm.style.display='none';dv.style.display='none';}
  document.getElementById('overlay').classList.add('show');
  document.body.style.overflow='hidden';
}
function hideM(){document.getElementById('overlay').classList.remove('show');document.body.style.overflow='';}
function closeM(e){if(e.target===document.getElementById('overlay')||e.target.classList.contains('ov-bg'))hideM();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')hideM();});
function esc(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n');}
function setF(k){filter=k;render();}
load();
</script>

</body>
</html>
