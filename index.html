<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>グラスミス アイスクリーム - 在庫一覧</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+2:wght@300;400;500;600;700;800;900&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'M PLUS 2','Noto Sans JP','Hiragino Sans',sans-serif;
    background:#F0F2F6;color:#1A2030;min-height:100vh;
    -webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes modalIn{from{opacity:0;transform:scale(0.94) translateY(12px)}to{opacity:1;transform:scale(1) translateY(0)}}
  @keyframes overlayIn{from{opacity:0}to{opacity:1}}

  .header{padding:52px 24px 44px;text-align:center;background:linear-gradient(180deg,#F6F8FC 0%,#F0F2F6 100%);border-bottom:1px solid rgba(0,0,0,0.04);}
  .h-tag{font:600 10px/1 'DM Sans',sans-serif;letter-spacing:0.3em;color:#3D8EBF;text-transform:uppercase;margin-bottom:14px;}
  .h-title{font-size:30px;font-weight:900;letter-spacing:0.08em;color:#1A2030;margin-bottom:2px;}
  .h-sub{font-size:12px;font-weight:500;letter-spacing:0.22em;color:#8A92A4;margin-bottom:22px;}
  .h-line{width:36px;height:2px;background:linear-gradient(90deg,#3D8EBF,#28B8A0);margin:0 auto 16px;border-radius:1px;}
  .h-date{font-size:10px;color:#A0A8B8;letter-spacing:0.06em;}
  .content{max-width:600px;margin:0 auto;padding:28px 18px 80px;}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:26px;}
  .st{background:#fff;border-radius:14px;padding:18px 12px;text-align:center;border:1px solid #E4E8F0;box-shadow:0 2px 8px rgba(0,0,0,0.03);animation:fadeUp 0.5s ease both;}
  .st:nth-child(1){animation-delay:.1s}.st:nth-child(2){animation-delay:.15s}.st:nth-child(3){animation-delay:.2s}
  .st-v{font:800 28px/1 'DM Sans',sans-serif;font-variant-numeric:tabular-nums;}
  .st-l{font-size:10px;font-weight:700;color:#8A92A4;margin-top:6px;letter-spacing:0.06em;}

  .filters{display:flex;gap:8px;margin-bottom:30px;flex-wrap:wrap;justify-content:center;animation:fadeUp .5s ease .2s both;}
  .fb{padding:8px 18px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid #DDE0E8;background:#fff;color:#8A92A4;cursor:pointer;transition:all .25s;font-family:inherit;white-space:nowrap;}
  .fb:hover{border-color:#B0B8C8;color:#5A6478;}
  .fb.on{background:linear-gradient(135deg,#3D8EBF,#28B8A0);color:#fff;border-color:transparent;font-weight:800;box-shadow:0 3px 12px rgba(61,142,191,0.25);}

  .cat{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
  .cat-l{flex:1;height:1px;background:linear-gradient(90deg,transparent,#D8DCE6);}
  .cat-lr{background:linear-gradient(90deg,#D8DCE6,transparent);}
  .cat-t{font-size:10px;font-weight:800;letter-spacing:0.18em;color:#A0A8B8;white-space:nowrap;text-transform:uppercase;}

  .card{background:#fff;border-radius:12px;padding:15px 16px;border:1px solid #E4E8F0;margin-bottom:6px;display:flex;align-items:center;gap:12px;transition:all .25s ease;cursor:pointer;user-select:none;-webkit-user-select:none;box-shadow:0 1px 4px rgba(0,0,0,0.02);}
  .card:hover{box-shadow:0 6px 20px rgba(0,0,0,0.06);border-color:#D0D4E0;}
  .card:active{transform:scale(0.99);}
  .card.out{opacity:.4;}.card.out:hover{box-shadow:0 1px 4px rgba(0,0,0,0.02);border-color:#E4E8F0;}
  .card.nc{cursor:default;}
  .cb{width:3px;border-radius:2px;flex-shrink:0;align-self:stretch;min-height:40px;}
  .ci{flex:1;min-width:0;}
  .cn-row{display:flex;align-items:baseline;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
  .cn{font-size:14px;font-weight:700;color:#1A2030;display:flex;align-items:center;gap:5px;}
  .cn.x{color:#B0B8C8;text-decoration:line-through;text-decoration-color:#D0D4E0;}
  .tap-hint{width:12px;height:12px;flex-shrink:0;color:#3D8EBF;opacity:.4;transition:opacity .2s;}
  .card:hover .tap-hint{opacity:.7;}
  .cp{font:700 12px/1 'DM Sans',sans-serif;font-variant-numeric:tabular-nums;white-space:nowrap;color:#5A6478;}
  .cp .tx{font-size:9px;font-weight:600;color:#8A92A4;margin-left:2px;font-family:'M PLUS 2',sans-serif;}
  .ctd{font-size:10px;font-weight:600;color:#C0C8D4;}

  .sr{display:flex;align-items:center;gap:10px;}
  .s-track{flex:1;height:5px;border-radius:3px;background:#EEF0F4;overflow:hidden;}
  .s-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.25,.8,.25,1);}
  .s-num{font:900 20px/1 'DM Sans',sans-serif;min-width:30px;text-align:right;font-variant-numeric:tabular-nums;}
  .s-out{font-size:10px;font-weight:800;color:#C0C8D4;letter-spacing:.1em;}

  /* ── Modal ── */
  .ov{display:none;position:fixed;inset:0;z-index:1000;align-items:center;justify-content:center;padding:24px;}
  .ov.show{display:flex;animation:overlayIn .25s ease both;}
  .ov-bg{position:absolute;inset:0;background:rgba(20,28,40,0.35);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);}
  .md{
    position:relative;z-index:1;background:#fff;border:1px solid #E4E8F0;
    border-radius:20px;overflow:hidden;
    max-width:400px;width:100%;
    box-shadow:0 24px 80px rgba(0,0,0,0.12),0 0 0 1px rgba(0,0,0,0.03);
    animation:modalIn .3s cubic-bezier(.2,.8,.2,1) both;
  }
  /* Image area */
  .md-img-wrap{
    width:100%;aspect-ratio:4/3;background:#EEF0F4;
    display:none;align-items:center;justify-content:center;overflow:hidden;
    position:relative;
  }
  .md-img-wrap.has-img{display:flex;}
  .md-img{width:100%;height:100%;object-fit:cover;}
  .md-img-placeholder{color:#C0C8D4;font-size:11px;font-weight:600;}

  .md-body{padding:24px 24px 20px;}
  .md-bar{width:28px;height:3px;border-radius:2px;margin:0 0 14px;}
  .md-name{font-size:18px;font-weight:800;color:#1A2030;margin-bottom:4px;}
  .md-price{font:700 14px/1 'DM Sans',sans-serif;color:#3D8EBF;margin-bottom:16px;}
  .md-price .tx{font-size:10px;color:#6AAED0;font-family:'M PLUS 2',sans-serif;}
  .md-div{height:1px;background:#EEF0F4;margin-bottom:16px;}
  .md-comment{font-size:13px;font-weight:500;color:#5A6478;line-height:1.8;white-space:pre-wrap;}
  .md-close{
    margin-top:20px;width:100%;padding:12px;border-radius:10px;
    background:#F4F6FA;border:1px solid #E4E8F0;
    color:#8A92A4;font-size:12px;font-weight:700;font-family:inherit;
    cursor:pointer;transition:all .2s;letter-spacing:.04em;
  }
  .md-close:hover{background:#EAEdf4;color:#5A6478;}

  .empty{text-align:center;padding:60px 0;color:#B0B8C8;font-size:13px;font-weight:700;}
  .footer{text-align:center;padding:28px 20px 20px;font-size:9px;color:#B0B8C8;letter-spacing:.06em;border-top:1px solid #E4E8F0;max-width:600px;margin:0 auto;}
  .loading{text-align:center;padding:48px;color:#A0A8B8;font-size:13px;}
  .loading::after{content:'';display:inline-block;width:14px;height:14px;border:2px solid #D8DCE6;border-top-color:#3D8EBF;border-radius:50%;animation:spin .6s linear infinite;margin-left:8px;vertical-align:middle;}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header class="header">
  <p class="h-tag">I love IceCream</p>
  <h1 class="h-title">グラスミス</h1>
  <p class="h-sub">アイスクリーム</p>
  <div class="h-line"></div>
  <p class="h-date" id="updateDate">読み込み中...</p>
</header>

<div class="content">
  <div class="stats" id="statsArea"></div>
  <div class="filters" id="filterArea"></div>
  <div id="itemsArea"><div class="loading">在庫データを読み込み中</div></div>
</div>
<div class="footer" id="footer" style="display:none">© グラスミス アイスクリーム</div>

<!-- Modal -->
<div class="ov" id="overlay" onclick="closeM(event)">
  <div class="ov-bg"></div>
  <div class="md" id="modal">
    <div class="md-img-wrap" id="mImgWrap">
      <img class="md-img" id="mImg" src="" alt="">
    </div>
    <div class="md-body">
      <div class="md-bar" id="mBar"></div>
      <div class="md-name" id="mName"></div>
      <div class="md-price" id="mPrice"></div>
      <div class="md-div"></div>
      <div class="md-comment" id="mComment"></div>
      <button class="md-close" onclick="hideM()">閉じる</button>
    </div>
  </div>
</div>

<script>
const COLORS={
  'バニラ':'#D4A840','抹茶':'#5C9A40','チョコチップ':'#8A7060',
  'ラムレーズンアイスチーズ':'#B88040','ラムレーズン':'#8060A0',
  '苺':'#C04860','ピスタチオ':'#4C8A40','塩バニラ':'#5878A0',
  'チョコミント':'#3A9088','キャラメル':'#B88040','クッキー':'#9A8A70',
  'さつまいも':'#905088','マロン':'#887050','パッション':'#C07020',
  'ラズベリー':'#A83878','チーズ':'#B8A030',
};
function gc(n){const k=Object.keys(COLORS).sort((a,b)=>b.length-a.length);for(const c of k)if(n.includes(c))return COLORS[c];return'#8A92A4';}

const IC='<svg class="tap-hint" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>';

let allData=[],filter='all';

async function load(){
  try{
    const r=await fetch('inventory.json?t='+Date.now());
    const j=await r.json();
    allData=j.items||[];
    document.getElementById('updateDate').textContent=(j.updated||'')+' 更新';
    document.getElementById('footer').style.display='block';
    render();
  }catch(e){
    document.getElementById('updateDate').textContent='';
    document.getElementById('itemsArea').innerHTML='<div class="empty">inventory.json が見つかりません</div>';
  }
}

function render(){
  const mx=Math.max(...allData.map(d=>d.stock),1);
  const s={total:allData.length,avail:allData.filter(d=>d.stock>0).length,low:allData.filter(d=>d.stock>0&&d.stock<=2).length,out:allData.filter(d=>d.stock===0).length,sum:allData.reduce((a,d)=>a+d.stock,0)};

  document.getElementById('statsArea').innerHTML=[
    {l:'在庫合計',v:s.sum,c:'#1A2030'},{l:'残りわずか',v:s.low,c:'#E07040'},{l:'品切れ',v:s.out,c:'#C0C8D4'},
  ].map(x=>`<div class="st"><div class="st-v" style="color:${x.c}">${x.v}</div><div class="st-l">${x.l}</div></div>`).join('');

  document.getElementById('filterArea').innerHTML=[
    {k:'all',l:'すべて '+s.total},{k:'available',l:'在庫あり '+s.avail},
    {k:'low',l:'残りわずか '+s.low},{k:'out',l:'品切れ '+s.out},
  ].map(f=>`<button class="fb ${filter===f.k?'on':''}" onclick="setF('${f.k}')">${f.l}</button>`).join('');

  let items=allData;
  if(filter==='available')items=items.filter(d=>d.stock>0);
  if(filter==='low')items=items.filter(d=>d.stock>0&&d.stock<=2);
  if(filter==='out')items=items.filter(d=>d.stock===0);
  const g={};items.forEach(d=>{const c=d.container||'その他';if(!g[c])g[c]=[];g[c].push(d);});
  if(!Object.keys(g).length){document.getElementById('itemsArea').innerHTML='<div class="empty">該当する商品がありません</div>';return;}

  let h='',idx=0;
  for(const[cat,list]of Object.entries(g)){
    h+=`<div style="margin-bottom:40px"><div class="cat"><div class="cat-lr cat-l"></div><div class="cat-t">${cat}</div><div class="cat-l"></div></div>`;
    for(const it of list){
      const o=it.stock===0,clr=o?'#D0D4E0':gc(it.flavor),lo=it.stock>0&&it.stock<=2,sc=o?'#D0D4E0':(lo?'#E07040':clr),pct=o?0:Math.max((it.stock/mx)*100,8),dl=(0.12+idx*0.025).toFixed(2);
      const hc=it.comment&&it.comment.trim();
      const hi=it.image&&it.image.trim();
      const hasDetail=hc||hi;
      const price=it.price>0?`<div class="cp" style="color:${o?'#C0C8D4':'#5A6478'}">¥${it.price.toLocaleString()}<span class="tx">税込</span></div>`:(!o?'<div class="ctd">価格未定</div>':'');
      const stock=o?'<div class="sr"><div class="s-track"></div><div class="s-out">品切れ</div></div>':`<div class="sr"><div class="s-track"><div class="s-fill" style="width:${pct}%;background:${sc}"></div></div><div class="s-num" style="color:${sc}">${it.stock}</div></div>`;
      const ca=hasDetail?`onclick="showM('${esc(it.flavor)}',${it.price||0},'${clr}','${esc(it.comment||'')}','${esc(it.image||'')}')"`:''
      h+=`<div class="card ${o?'out':''} ${hasDetail?'':'nc'}" style="animation:fadeUp .4s ease ${dl}s both" ${ca}>
        <div class="cb" style="background:${clr}"></div>
        <div class="ci"><div class="cn-row"><div class="cn ${o?'x':''}">${it.flavor} ${hasDetail?IC:''}</div>${price}</div>${stock}</div>
      </div>`;
      idx++;
    }
    h+='</div>';
  }
  document.getElementById('itemsArea').innerHTML=h;
}

function showM(name,price,color,comment,image){
  const wrap=document.getElementById('mImgWrap');
  const img=document.getElementById('mImg');
  if(image){
    img.src=image;
    img.alt=name;
    wrap.classList.add('has-img');
  }else{
    img.src='';
    wrap.classList.remove('has-img');
  }
  document.getElementById('mBar').style.background=color;
  document.getElementById('mName').textContent=name;
  const mp=document.getElementById('mPrice');
  if(price>0){mp.innerHTML='¥'+price.toLocaleString()+'<span class="tx"> 税込</span>';mp.style.display='block';}else{mp.style.display='none';}
  const cm=document.getElementById('mComment');
  if(comment){
    cm.innerHTML=comment.replace(/\\n/g,'<br>').replace(/\n/g,'<br>');
    cm.style.display='block';
    cm.previousElementSibling.style.display='block';
  }else{
    cm.style.display='none';
    cm.previousElementSibling.style.display='none';
  }
  document.getElementById('overlay').classList.add('show');
  document.body.style.overflow='hidden';
}
function hideM(){document.getElementById('overlay').classList.remove('show');document.body.style.overflow='';}
function closeM(e){if(e.target===document.getElementById('overlay')||e.target.classList.contains('ov-bg'))hideM();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')hideM();});

function esc(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n');}
function setF(k){filter=k;render();}
load();
</script>
</body>
</html>
