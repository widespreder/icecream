<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>グラスミス アイスクリーム</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+2:wght@300;400;500;600;700;800;900&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'M PLUS 2','Hiragino Sans',sans-serif;
    background:#fff;color:#1d1d1f;
    -webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;
    overflow-x:hidden;
  }

.hero{
display:flex;flex-direction:column;
align-items:center;justify-content:center;text-align:center;
padding:40px 24px 32px;
background:linear-gradient(180deg,#fbfbfd 0%,#f5f5f7 100%);
}
.hero-tag{
font:500 11px/1 ‘DM Sans’,sans-serif;letter-spacing:0.25em;
color:#0071e3;text-transform:uppercase;margin-bottom:10px;
opacity:0;animation:fadeIn .8s ease .2s forwards;
}
.hero-title{
font-size:clamp(32px,7vw,48px);font-weight:900;
letter-spacing:0.04em;color:#1d1d1f;
line-height:1.1;margin-bottom:4px;
opacity:0;animation:fadeIn .8s ease .4s forwards;
}
.hero-sub{
font-size:clamp(13px,2.5vw,17px);font-weight:400;
letter-spacing:0.14em;color:#86868b;
opacity:0;animation:fadeIn .8s ease .6s forwards;
}

.sec-filter{
background:rgba(255,255,255,0.85);
backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
padding:12px 12px;text-align:center;position:sticky;top:0;z-index:50;
border-bottom:1px solid #e8e8ed;
overflow-x:auto;-webkit-overflow-scrolling:touch;
}
.filters{display:flex;gap:6px;justify-content:center;flex-wrap:nowrap;min-width:min-content;}
.fb{
padding:6px 12px;border-radius:16px;font-size:11px;font-weight:600;
border:1px solid #d2d2d7;background:#fff;color:#86868b;
cursor:pointer;transition:all .3s;font-family:inherit;white-space:nowrap;flex-shrink:0;
}
.fb:hover{border-color:#aaa;color:#1d1d1f;}
.fb.on{background:#1d1d1f;color:#fff;border-color:#1d1d1f;}

.sec-items{max-width:680px;margin:0 auto;padding:48px 20px 80px;}
.cat-block{margin-bottom:56px;}
.cat-title{font-size:28px;font-weight:800;color:#1d1d1f;text-align:center;margin-bottom:32px;letter-spacing:.04em;}

.card{
background:#f5f5f7;border-radius:18px;
padding:18px 20px;margin-bottom:10px;
display:flex;align-items:center;gap:14px;
cursor:pointer;user-select:none;-webkit-user-select:none;
transition:all .3s ease;border:1px solid transparent;
}
.card:hover{background:#eee;border-color:#e0e0e0;}
.card:active{transform:scale(0.985);}
.card.out{opacity:.35;}.card.out:hover{background:#f5f5f7;border-color:transparent;}
.card.nc{cursor:default;}.card.nc:active{transform:none;}

.c-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;align-self:flex-start;margin-top:8px;}
.c-body{flex:1;min-width:0;}
.c-top{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:6px;}
.c-name{font-size:18px;font-weight:700;color:#1d1d1f;display:flex;align-items:center;gap:6px;min-width:0;}
.c-name.x{color:#b0b0b0;text-decoration:line-through;text-decoration-color:#d2d2d7;}
.c-info{width:14px;height:14px;flex-shrink:0;color:#0071e3;opacity:.5;}
.c-price{font:700 16px/1 ‘DM Sans’,sans-serif;color:#1d1d1f;white-space:nowrap;flex-shrink:0;text-align:right;}
.c-price .tx{font-size:10px;font-weight:500;font-family:‘M PLUS 2’,sans-serif;margin-left:2px;color:#86868b;}
.c-tbd{font-size:12px;font-weight:500;color:#b0b0b0;flex-shrink:0;}

/* ── Stock display ── */
.stock-line{display:flex;align-items:center;gap:8px;margin-top:2px;}
.stock-badge{
display:inline-flex;align-items:center;gap:5px;
padding:4px 10px;border-radius:8px;
font-size:14px;font-weight:700;
}
.stock-badge.ok{background:#e8f5e4;color:#2d7a2d;}
.stock-badge.low{background:#fff3e0;color:#d4622b;}
.stock-badge.out{background:#f2f2f2;color:#b0b0b0;}
.stock-badge .mark{font-size:12px;}
.stock-num{font:700 14px/1 ‘DM Sans’,sans-serif;color:#6e6e73;}

/* ── Modal ── */
.ov{display:none;position:fixed;inset:0;z-index:1000;align-items:center;justify-content:center;padding:20px;}
.ov.show{display:flex;animation:fadeIn .2s ease both;}
.ov-bg{position:absolute;inset:0;background:rgba(0,0,0,0.4);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);}
.md{
position:relative;z-index:1;background:#fff;
border-radius:20px;overflow:hidden;
max-width:420px;width:100%;
box-shadow:0 20px 60px rgba(0,0,0,0.12),0 0 0 1px rgba(0,0,0,0.04);
animation:modalUp .35s cubic-bezier(.2,.8,.2,1) both;
}
.md-img-wrap{width:100%;aspect-ratio:1/1;background:#f5f5f7;display:none;align-items:center;justify-content:center;overflow:hidden;}
.md-img-wrap.has{display:flex;}
.md-img{width:100%;height:100%;object-fit:cover;}
.md-body{padding:24px;}
.md-name{font-size:22px;font-weight:800;color:#1d1d1f;margin-bottom:4px;}
.md-price{font:700 16px/1 ‘DM Sans’,sans-serif;color:#0071e3;margin-bottom:20px;}
.md-price .tx{font-size:11px;color:#4da3ff;font-family:‘M PLUS 2’,sans-serif;}
.md-div{height:1px;background:#e8e8ed;margin-bottom:16px;}
.md-comment{font-size:14px;font-weight:400;color:#6e6e73;line-height:1.8;white-space:pre-wrap;}
.md-close{
margin-top:24px;width:100%;padding:14px;border-radius:12px;
background:#f5f5f7;border:none;
color:#86868b;font-size:14px;font-weight:600;font-family:inherit;
cursor:pointer;transition:all .2s;
}
.md-close:hover{background:#e8e8ed;color:#1d1d1f;}

.footer{text-align:center;padding:40px 20px 32px;font-size:11px;color:#b0b0b0;letter-spacing:.04em;border-top:1px solid #e8e8ed;max-width:680px;margin:0 auto;}
.empty{text-align:center;padding:80px 0;color:#b0b0b0;font-size:14px;font-weight:600;}

@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes modalUp{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.reveal{opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease;}
.reveal.visible{opacity:1;transform:translateY(0);}
</style>

</head>
<body>

<section class="hero">
  <p class="hero-tag">I love IceCream</p>
  <h1 class="hero-title">グラスミス</h1>
  <p class="hero-sub">アイスクリーム</p>
</section>

<nav class="sec-filter">
  <div class="filters" id="filterArea"></div>
</nav>

<div class="sec-items" id="itemsArea"></div>
<div class="footer" id="footer" style="display:none">© グラスミス アイスクリーム</div>

<div class="ov" id="overlay" onclick="closeM(event)">
  <div class="ov-bg"></div>
  <div class="md" id="modal">
    <div class="md-img-wrap" id="mImgW"><img class="md-img" id="mImg" src="" alt=""></div>
    <div class="md-body">
      <div class="md-name" id="mName"></div>
      <div class="md-price" id="mPrice"></div>
      <div class="md-div" id="mDiv"></div>
      <div class="md-comment" id="mCmt"></div>
      <button class="md-close" onclick="hideM()">閉じる</button>
    </div>
  </div>
</div>

<script>
const C={
  'バニラ':'#D4A840','抹茶':'#5C9A40','チョコチップ':'#8A7060',
  'ラムレーズンアイスチーズ':'#B88040','ラムレーズン':'#8060A0',
  '苺':'#E0506A','ピスタチオ':'#4C8A40','塩バニラ':'#5878A0',
  'チョコミント':'#3A9088','キャラメル':'#B88040','クッキー':'#9A8A70',
  'さつまいも':'#905088','マロン':'#887050','パッション':'#D07828',
  'ラズベリー':'#B83878','チーズ':'#C0A830',
};
function gc(n){const k=Object.keys(C).sort((a,b)=>b.length-a.length);for(const c of k)if(n.includes(c))return C[c];return'#86868b';}
const INFO='<svg class="c-info" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>';

let allData=[],filter='all';

async function load(){
  try{
    const r=await fetch('inventory.json?t='+Date.now());
    const j=await r.json();
    allData=j.items||[];
    document.getElementById('footer').style.display='block';
    render();observe();
  }catch(e){
    document.getElementById('itemsArea').innerHTML='<div class="empty">inventory.json が見つかりません</div>';
  }
}

function stockHtml(stock){
  if(stock===0){
    return '<div class="stock-line"><span class="stock-badge out"><span class="mark">✕</span>品切れ</span></div>';
  }
  if(stock<=2){
    return '<div class="stock-line"><span class="stock-badge low"><span class="mark">△</span>残りわずか</span><span class="stock-num">在庫 '+stock+'個</span></div>';
  }
  return '<div class="stock-line"><span class="stock-badge ok"><span class="mark">◎</span>在庫あり</span><span class="stock-num">在庫 '+stock+'個</span></div>';
}

function render(){
  const s={total:allData.length,avail:allData.filter(d=>d.stock>0).length,low:allData.filter(d=>d.stock>0&&d.stock<=2).length,out:allData.filter(d=>d.stock===0).length};
  document.getElementById('filterArea').innerHTML=[
    {k:'all',l:'すべて '+s.total},{k:'available',l:'在庫あり '+s.avail},
    {k:'low',l:'残りわずか '+s.low},{k:'out',l:'品切れ '+s.out},
  ].map(f=>`<button class="fb ${filter===f.k?'on':''}" onclick="setF('${f.k}')">${f.l}</button>`).join('');

  let items=allData;
  if(filter==='available')items=items.filter(d=>d.stock>0);
  if(filter==='low')items=items.filter(d=>d.stock>0&&d.stock<=2);
  if(filter==='out')items=items.filter(d=>d.stock===0);
  const g={};items.forEach(d=>{const c=d.container||'その他';if(!g[c])g[c]=[];g[c].push(d);});
  if(!Object.keys(g).length){document.getElementById('itemsArea').innerHTML='<div class="empty">該当する商品がありません</div>';return;}

  let h='';
  for(const[cat,list]of Object.entries(g)){
    h+=`<div class="cat-block reveal"><div class="cat-title">${cat}</div>`;
    for(const it of list){
      const o=it.stock===0,clr=o?'#d2d2d7':gc(it.flavor);
      const hc=it.comment&&it.comment.trim(),hi=it.image&&it.image.trim(),hd=hc||hi;
      const price=it.price>0?`<div class="c-price">¥${it.price.toLocaleString()}<span class="tx">税込</span></div>`:(!o?'<div class="c-tbd">価格未定</div>':'');
      const click=hd?`onclick="showM('${esc(it.flavor)}',${it.price||0},'${clr}','${esc(it.comment||'')}','${esc(it.image||'')}')"`:''
      h+=`<div class="card ${o?'out':''} ${hd?'':'nc'}" ${click}>
        <div class="c-dot" style="background:${clr}"></div>
        <div class="c-body">
          <div class="c-top"><div class="c-name ${o?'x':''}">${it.flavor}${hd?INFO:''}</div>${price}</div>
          ${stockHtml(it.stock)}
        </div>
      </div>`;
    }
    h+='</div>';
  }
  document.getElementById('itemsArea').innerHTML=h;
  observe();
}

function observe(){
  const els=document.querySelectorAll('.reveal');
  const io=new IntersectionObserver((entries)=>{
    entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');io.unobserve(e.target);}});
  },{threshold:0.15});
  els.forEach(el=>io.observe(el));
}

function showM(name,price,color,comment,image){
  const w=document.getElementById('mImgW'),img=document.getElementById('mImg');
  if(image){img.src=image;img.alt=name;w.classList.add('has');}else{img.src='';w.classList.remove('has');}
  document.getElementById('mName').textContent=name;
  const mp=document.getElementById('mPrice');
  if(price>0){mp.innerHTML='¥'+price.toLocaleString()+'<span class="tx"> 税込</span>';mp.style.display='block';}else{mp.style.display='none';}
  const cm=document.getElementById('mCmt'),dv=document.getElementById('mDiv');
  if(comment){cm.innerHTML=comment.replace(/\\n/g,'<br>').replace(/\n/g,'<br>');cm.style.display='block';dv.style.display='block';}else{cm.style.display='none';dv.style.display='none';}
  document.getElementById('overlay').classList.add('show');
  document.body.style.overflow='hidden';
}
function hideM(){document.getElementById('overlay').classList.remove('show');document.body.style.overflow='';}
function closeM(e){if(e.target===document.getElementById('overlay')||e.target.classList.contains('ov-bg'))hideM();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')hideM();});
function esc(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n');}
function setF(k){filter=k;render();}
load();
</script>

</body>
</html>
